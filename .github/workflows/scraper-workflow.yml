name: Scrape after55.com Active Adult Properties

on:
  workflow_dispatch:  # Run manually from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 openpyxl

      - name: Run scraper
        run: python after55_scraper.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: after55-active-adult-properties
          path: |
            after55_active_adult_properties.xlsx
            after55_scraper.log
          retention-days: 30
