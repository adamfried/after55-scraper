name: Scrape after55.com → Supabase

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests playwright beautifulsoup4

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: python after55_scraper.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: |
            after55_scraper.log
            debug_screenshot.png
          retention-days: 30
